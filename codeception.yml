actor: Tester
bootstrap: _bootstrap.php
paths:
    tests: tests
    output: tests/_output
    data: tests/_data
    helpers: tests/_support
settings:
    memory_limit: 1024M
    colors: true
modules:
    config:
        Yii2:
            configFile: 'config/test.php'

coverage:
    enabled: false
    whitelist:
        include:
            - assets/*
            - components/*
            - controllers/*
            - models/*
            - src/*
            - validators/*
            - widgets/*
